<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Mess Feedback - Stage 3</title>
  <style>
    body {
      background: linear-gradient(180deg, #b7e7ff 0%, #d5f0ff 100%);
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      color: #0d2f5d;
    }

    .card {
      max-width: 760px;
      margin: 0 auto;
      background-color: #ffffff;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(13, 47, 93, 0.12);
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    .note {
      text-align: center;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .item {
      border: 1px solid #b7c7d8;
      border-radius: 8px;
      padding: 8px 10px;
      text-align: left;
      background-color: #f5fbff;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .btn,
    .btn-link {
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      text-decoration: none;
      cursor: pointer;
    }

    .btn-link {
      background-color: #0d4da4;
    }

    .btn-link:hover {
      background-color: #0a3b7d;
    }

    .btn {
      background-color: #138a49;
    }

    .btn:hover {
      background-color: #0f6f3b;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Vegetarian Menu Selection</h1>
    <p class="note">Select one or more vegetarian items</p>

    <form id="vegMenuForm" novalidate>
      <div class="grid">
        <label class="item"><input type="checkbox" value="Paneer Butter Masala"> Paneer Butter Masala</label>
        <label class="item"><input type="checkbox" value="Mix Veg Curry"> Mix Veg Curry</label>
        <label class="item"><input type="checkbox" value="Aloo Jeera"> Aloo Jeera</label>
        <label class="item"><input type="checkbox" value="Dal Tadka"> Dal Tadka</label>
        <label class="item"><input type="checkbox" value="Rajma Chawal"> Rajma Chawal</label>
        <label class="item"><input type="checkbox" value="Chole Kulche"> Chole Kulche</label>
        <label class="item"><input type="checkbox" value="Veg Biryani"> Veg Biryani</label>
        <label class="item"><input type="checkbox" value="Palak Paneer"> Palak Paneer</label>
      </div>

      <div class="actions">
        <a href="page_02.html" class="btn-link">Previous</a>
        <button class="btn" type="submit">Save / Next</button>
      </div>
    </form>
  </main>

  <script>
    const preferenceKey = "messFeedback.mealPreference";
    const storageKey = "messFeedback.vegMenuSelections";
    const form = document.getElementById("vegMenuForm");
    const checkboxes = Array.from(form.querySelectorAll('input[type="checkbox"]'));

    function loadSelections() {
      const saved = localStorage.getItem(storageKey);
      if (!saved) {
        return;
      }

      try {
        const selectedItems = JSON.parse(saved);
        checkboxes.forEach(function (checkbox) {
          checkbox.checked = selectedItems.includes(checkbox.value);
        });
      } catch (error) {
        localStorage.removeItem(storageKey);
      }
    }

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const selectedItems = checkboxes
        .filter(function (checkbox) {
          return checkbox.checked;
        })
        .map(function (checkbox) {
          return checkbox.value;
        });

      const prefRaw = localStorage.getItem(preferenceKey);
      let vegRequired = true;

      if (prefRaw) {
        try {
          const pref = JSON.parse(prefRaw);
          vegRequired = Boolean(pref.veg);
        } catch (error) {
          vegRequired = true;
        }
      }

      if (vegRequired && selectedItems.length === 0) {
        alert("Please select at least one vegetarian item before proceeding.");
        return;
      }

      localStorage.setItem(storageKey, JSON.stringify(selectedItems));
      window.location.href = "page_04.html";
    });

    loadSelections();
  </script>
</body>
</html>
