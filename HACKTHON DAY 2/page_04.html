<script>
   document.querySelector('.linkN').addEventListener('click', function(event) {
     
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    let isChecked = false;
    checkboxes.forEach(checkbox => {
      if (checkbox.checked) {
        isChecked = true;
      }
    });
    if (!isChecked) {
      event.preventDefault(); 
      alert('Please select at least one food preference before proceeding.');
    }
  });
</script>
