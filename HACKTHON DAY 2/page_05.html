<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Mess Feedback - Stage 5</title>
  <style>
    body {
      background: linear-gradient(180deg, #b7e7ff 0%, #d5f0ff 100%);
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      color: #0d2f5d;
    }

    .card {
      max-width: 760px;
      margin: 0 auto;
      background-color: #ffffff;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(13, 47, 93, 0.12);
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    .field {
      margin-bottom: 14px;
      text-align: left;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
    }

    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #b7c7d8;
      font-size: 15px;
      font-family: inherit;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .btn,
    .btn-link {
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
      text-decoration: none;
      cursor: pointer;
    }

    .btn-link {
      background-color: #0d4da4;
    }

    .btn-link:hover {
      background-color: #0a3b7d;
    }

    .btn {
      background-color: #138a49;
    }

    .btn:hover {
      background-color: #0f6f3b;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Review and Final Feedback</h1>

    <form id="reviewForm" novalidate>
      <div class="field">
        <label for="foodPhoto">Upload mess food photo (optional)</label>
        <input type="file" id="foodPhoto" accept="image/*">
      </div>

      <div class="field">
        <label for="messFeedback">Feedback about mess food</label>
        <textarea id="messFeedback" placeholder="Write your feedback about food quality, menu, hygiene, and service"></textarea>
      </div>

      <div class="field">
        <label for="websiteFeedback">Feedback about this web page</label>
        <textarea id="websiteFeedback" placeholder="Share your suggestions to improve this feedback form"></textarea>
      </div>

      <div class="actions">
        <a href="page_02.html" class="btn-link">Previous</a>
        <button class="btn" type="submit">Submit</button>
      </div>
    </form>
  </main>

  <script>
    const storageKey = "messFeedback.review";
    const form = document.getElementById("reviewForm");
    const fileInput = document.getElementById("foodPhoto");
    const messFeedback = document.getElementById("messFeedback");
    const websiteFeedback = document.getElementById("websiteFeedback");

    function loadSavedData() {
      const saved = localStorage.getItem(storageKey);
      if (!saved) {
        return;
      }

      try {
        const data = JSON.parse(saved);
        messFeedback.value = data.messFeedback || "";
        websiteFeedback.value = data.websiteFeedback || "";
      } catch (error) {
        localStorage.removeItem(storageKey);
      }
    }

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const messText = messFeedback.value.trim();
      const webText = websiteFeedback.value.trim();
      const fileName = fileInput.files.length > 0 ? fileInput.files[0].name : "";

      if (!messText && !webText) {
        alert("Please enter at least one feedback message before submitting.");
        return;
      }

      localStorage.setItem(
        storageKey,
        JSON.stringify({
          messFeedback: messText,
          websiteFeedback: webText,
          foodPhotoName: fileName
        })
      );

      window.location.href = "End.html";
    });

    loadSavedData();
  </script>
</body>
</html>
