<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Mess Feedback - Personal Details</title>
  <style>
    body {
      background: linear-gradient(180deg, #b7e7ff 0%, #d5f0ff 100%);
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      color: #0d2f5d;
    }

    .card {
      max-width: 640px;
      margin: 0 auto;
      background-color: #ffffff;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(13, 47, 93, 0.12);
    }

    h1 {
      margin-top: 0;
      text-align: center;
      text-decoration: underline;
    }

    .field {
      margin-bottom: 14px;
      text-align: left;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
    }

    input,
    select {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #b7c7d8;
      font-size: 15px;
    }

    .actions {
      margin-top: 20px;
      text-align: center;
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      background-color: #0d4da4;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #0a3b7d;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Personal Details</h1>
    <form id="personalForm" novalidate>
      <div class="field">
        <label for="studentName">Student Name</label>
        <input id="studentName" type="text" placeholder="Enter your name" required>
      </div>

      <div class="field">
        <label for="rollNumber">Roll Number</label>
        <input id="rollNumber" type="number" min="1" placeholder="Enter roll number" required>
      </div>

      <div class="field">
        <label for="department">Department</label>
        <select id="department" required>
          <option value="ECE">ECE</option>
          <option value="ECE(VLSI)">ECE(VLSI)</option>
          <option value="CSE">CSE</option>
          <option value="AIDS">AIDS</option>
          <option value="EE">EE</option>
          <option value="ME">ME</option>
        </select>
      </div>

      <div class="field">
        <label for="semester">Semester</label>
        <input id="semester" type="number" min="1" max="10" placeholder="Enter semester" required>
      </div>

      <div class="field">
        <label for="hostelName">Hostel Name</label>
        <input id="hostelName" type="text" placeholder="Enter hostel name" required>
      </div>

      <div class="actions">
        <button class="btn" type="submit">Save / Next</button>
      </div>
    </form>
  </main>

  <script>
    const storageKey = "messFeedback.personalDetails";
    const form = document.getElementById("personalForm");

    function loadSavedData() {
      const saved = localStorage.getItem(storageKey);
      if (!saved) {
        return;
      }

      try {
        const data = JSON.parse(saved);
        document.getElementById("studentName").value = data.studentName || "";
        document.getElementById("rollNumber").value = data.rollNumber || "";
        document.getElementById("department").value = data.department || "ECE";
        document.getElementById("semester").value = data.semester || "";
        document.getElementById("hostelName").value = data.hostelName || "";
      } catch (error) {
        localStorage.removeItem(storageKey);
      }
    }

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const studentName = document.getElementById("studentName").value.trim();
      const rollNumber = document.getElementById("rollNumber").value.trim();
      const department = document.getElementById("department").value;
      const semester = document.getElementById("semester").value.trim();
      const hostelName = document.getElementById("hostelName").value.trim();

      if (!studentName || !rollNumber || !semester || !hostelName) {
        alert("Please fill in all required fields.");
        return;
      }

      localStorage.setItem(
        storageKey,
        JSON.stringify({ studentName, rollNumber, department, semester, hostelName })
      );

      window.location.href = "page_02.html";
    });

    loadSavedData();
  </script>
</body>
</html>
